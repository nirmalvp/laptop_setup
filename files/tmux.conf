# ── Terminal ───────────────────────────────────────────────────────────────────
set -g  default-terminal "screen-256color"
set -s  escape-time 0         # No delay after Escape — critical for vim/neovim
set -g  focus-events on       # Tell editors when the pane gains/loses focus
setw -g xterm-keys on

# ── Indexing ───────────────────────────────────────────────────────────────────
set  -g base-index 1          # Windows start at 1, not 0
setw -g pane-base-index 1     # Panes start at 1 too (consistent with windows)
set  -g renumber-windows on   # Re-number windows when one is closed

# ── Mouse & scrollback ────────────────────────────────────────────────────────
set -g mouse on
set -g history-limit 50000

# ── Resize & activity ─────────────────────────────────────────────────────────
setw -g aggressive-resize on  # Resize to the smallest *active* viewer, not any viewer
setw -g monitor-activity on   # Highlight windows that have new output
set  -g visual-activity on    # Show a message when activity is detected
set  -g automatic-rename on   # Window title follows the running command

# ── Key bindings ──────────────────────────────────────────────────────────────
# Reload config without restarting tmux: prefix + r
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# Split panes — open in the same directory you're currently in
bind | split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'

# Move between panes: Alt + arrow (no prefix needed)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Switch windows: Shift + arrow (no prefix needed)
bind -n S-Left  previous-window
bind -n S-Right next-window

# Reorder windows: Shift + Up/Down (no prefix needed)
bind -n S-Up   swap-window -d -t -1
bind -n S-Down swap-window -d -t +1

# New window: Alt + n
bind -n M-n new-window

# Rename window: Alt + r
bind -n M-r command-prompt "rename-window %%"

# Jump to last window: Ctrl + T
bind C-T last-window

# ── Colours (Solarized 256) ───────────────────────────────────────────────────
set-option        -g status-style                 fg=colour136,bg=colour235
set-window-option -g window-status-style          fg=colour244,bg=default
set-window-option -g window-status-current-style  fg=colour166,bg=default
set-option        -g pane-border-style            fg=colour235
set-option        -g pane-active-border-style     fg=colour240
set-option        -g message-style                fg=colour166,bg=colour235
set-option        -g display-panes-active-colour  colour33
set-option        -g display-panes-colour         colour166
set-window-option -g clock-mode-colour            colour64
set-window-option -g window-status-bell-style     fg=colour235,bg=colour160

# ── Plugins (TPM) ─────────────────────────────────────────────────────────────
# If plugins aren't installed: press prefix + I to fetch them.
# To install TPM itself: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'

# Better mouse scrolling inside vim/less/man (fixes scroll jumping to the bottom)
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @emulate-scroll-for-no-mouse-alternate-buffer "on"

# Copy selected text to system clipboard with 'y' or mouse selection
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_selection_mouse 'clipboard'

# Must be the very last line
run '~/.tmux/plugins/tpm/tpm'
